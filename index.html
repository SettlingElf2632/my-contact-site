<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sett | Contact Page</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at 20% 20%, rgba(120, 170, 255, 0.16), transparent 30%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.08), transparent 25%),
                linear-gradient(135deg, #0b0f17 0%, #111827 45%, #090b10 100%);
            color: #eef2ff;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 1. Width of the scrollbar */
        ::-webkit-scrollbar {
            width: 8px;  /* Vertical scrollbar width */
            height: 8px; /* Horizontal scrollbar height */
        }

        /* 2. The Track (the background of the scrollbar) */
        ::-webkit-scrollbar-track,
        textarea::-webkit-scrollbar-track {
            background: transparent; /* Makes it blend into your glass panel */
        }

        /* 3. The Thumb (the part you click and drag) */
        ::-webkit-scrollbar-thumb,
        textarea::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1); /* Dark/Transparent look */
            border-radius: 10px; /* Rounded edges */
            border: 2px solid transparent; /* Creates a little "padding" effect */
            background-clip: content-box;
        }

        /* 4. Hover effect (adds a subtle blue glow from your theme) */
        ::-webkit-scrollbar-thumb:hover,
        textarea::-webkit-scrollbar-thumb:hover {
            background: rgba(125, 211, 252, 0.4); /* Matches your #7dd3fc accent */
            border: 2px solid transparent;
            background-clip: content-box;
        }

        /* Firefox Support (Limited styling options) */
        * {
            scrollbar-color: rgba(255, 255, 255, 0.350) transparent;
        }

        .glass-panel {
            background: rgba(8, 12, 20, 0.62);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        }

        /* --- CUSTOM DROPDOWN ANIMATIONS & STYLES --- */
        #custom-dropdown-menu {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top;
            opacity: 0;
            transform: translateY(-10px) scaleY(0.95);
            pointer-events: none;
        }

        /* The class applied when the menu is open */
        #custom-dropdown-menu.show {
            opacity: 1;
            transform: translateY(4px) scaleY(1);
            pointer-events: auto;
        }

        /* Arrow rotation animation */
        #dropdown-arrow {
            transition: transform 0.3s ease;
        }

        .rotate-arrow {
            transform: rotate(180deg);
        }

        /* Separator line style */
        .custom-separator {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* ------------------------------------------ */

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-entry { animation: fadeInUp 0.8s ease-out forwards; }
        .delay-1 { animation-delay: 0.3s; opacity: 0; }

        .profile-inner-border {
            border: 4px solid rgba(255, 255, 255, 0.08);
        }

        input, textarea {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            color: #eef2ff !important;
        }

        input:focus, textarea:focus {
            outline: none !important;
            border-color: #7dd3fc !important;
        }

        #other-purpose-container { display: none; }

        /* --- NEW TOAST NOTIFICATION STYLES --- */
        #toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(8, 12, 20, 0.7);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #72e7a4;
            padding: 1rem 2rem;
            border-radius: 1rem;
            z-index: 9999;
            font-weight: bold;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
            text-align: center;
        }

        #toast.show {
            top: 30px;
        }
    </style>
</head>
<body class="antialiased flex items-center justify-center p-4 md:p-8">

    <!-- Toast Notification Element -->
    <div id="toast">Message sent successfully!</div>

    <div class="flex flex-col gap-6 w-full max-w-[980px] animate-entry">
        <!-- About Me Section -->
        <section class="glass-panel rounded-[28px] p-8 md:p-10 flex flex-col md:flex-row items-center gap-8 animate-entry delay-1">
            <div class="w-32 h-32 md:w-40 md:h-40 rounded-full bg-gradient-to-tr from-[#042b4a] to-[#0df5ff] p-1 flex-shrink-0">
                <div class="w-full h-full rounded-full bg-[#0b0f17] overflow-hidden profile-inner-border">
                    <img src="sett_pfp.jpg" alt="Profile" class="w-full h-full object-cover">
                </div>
            </div>
            <div>
                <h2 class="text-3xl font-bold mb-3">About Me</h2>
                <p class="text-[#eef2ffb3] leading-relaxed text-lg">
                    Hey, I'm Sett and this is a simple website I created for contacting me. Feel free to choose a topic or set your own and send me a message. I hope to hear from you soon! :)
                </p>
            </div>
        </section>

        <!-- Contact Form Section -->
        <section class="glass-panel rounded-[28px] p-8 md:p-10 animate-entry delay-1">
            <h2 class="text-3xl font-bold mb-8 text-center">Get In Touch</h2>

            <!-- GOOGLE FORM INTEGRATION START -->
            <form id="google-form" action="https://docs.google.com/forms/d/e/1FAIpQLSe1et6_4vTX8ZA_rYNMaTswsW_MeMMTLd7_jzFIObyIHLA4Yg/formResponse" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <!-- Full Name Field -->
                <div class="flex flex-col gap-2">
                    <label for="name" class="text-sm text-[#eef2ffb3]">Full Name (or username)</label>
                    <input type="text" id="name" name="entry.714090066" placeholder="Name Surname" required
                           class="p-3 rounded-xl transition-all">
                </div>

                <!-- Email Field -->
                <div class="flex flex-col gap-2">
                    <label for="email" class="text-sm text-[#eef2ffb3]">Email Address</label>
                    <input type="email" id="email" name="entry.84324696" placeholder="name@example.com" required
                           class="p-3 rounded-xl transition-all">
                </div>

                <!-- CUSTOM DROPDOWN START -->
                <div class="flex flex-col gap-2 relative">
                    <label class="text-sm text-[#eef2ffb3]">Inquiry Type</label>
                    <!-- Hidden input to hold the value for Google Form -->
                    <input type="hidden" name="entry.199392113" id="inquiry-hidden-input" value="" required>
                    
                    <!-- The visible dropdown trigger -->
                    <div id="dropdown-trigger" class="p-3 rounded-xl transition-all cursor-pointer flex items-center justify-between bg-[rgba(255,255,255,0.05)] border border-[rgba(255,255,255,0.12)] select-none">
                        <span id="dropdown-label" class="text-[#eef2ffb3]">Select an option</span>
                        <svg id="dropdown-arrow" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[#7dd3fc]">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>

                    <!-- The actual dropdown menu (custom list) -->
                    <div id="custom-dropdown-menu" class="absolute top-full left-0 w-full mt-2 glass-panel rounded-xl overflow-hidden z-50 border-[rgba(255,255,255,0.12)]">
                        <div class="custom-option p-3 cursor-pointer text-[#eef2ngffb3] transition-colors hover:bg-white/5" data-value="Business">Business</div>
                        <div class="custom-separator p-0"></div>
                        <div class="custom-option p-3 cursor-pointer text-[#eef2ngffb3] transition-colors hover:bg-white/5" data-value="Fan Mail">Fan Mail</div>
                        <div class="custom-separator p-0"></div> 
                        <div class="custom-option p-3 cursor-pointer text-[#eef2ngffb3] transition-colors hover:bg-white/5" data-value="Collaboration">Collaboration</div>
                        <div class="custom-separator p-0"></div> 
                        <div class="custom-option p-3 cursor-pointer text-[#eef2ngffb3] transition-colors hover:bg-white/5" data-value="Question">Question</div>
                        <div class="custom-separator p-0"></div> 
                        <div class="custom-option p-3 cursor-pointer text-[#eef2ngffb3] transition-colors hover:bg-white/5" data-value="other">Other</div>
                    </div>
                </div>
                <!-- CUSTOM DROPDOWN END -->

                <!-- Dynamic "Other" Field -->
                <div id="other-purpose-container" class="flex flex-col gap-2 animate-entry">
                    <label for="other_detail" class="text-sm text-[#eef2ffb3]">Please specify</label>
                    <input type="text" id="other_detail" placeholder="Describe your topic..."
                           class="p-3 rounded-xl transition-all">
                </div>

                <!-- Message Field -->
                <div class="md:col-span-2 flex flex-col gap-2">
                    <label for="message" class="text-sm text-[#eef2ffb3]">Your Message</label>
                    <textarea id="message" name="entry.1434322097" rows="4" placeholder="Write your message here..." required
                              class="p-3 rounded-xl transition-all"></textarea>
                </div>

                <!-- Submit Button -->
                <div class="md:col-span-2 pt-2">
                    <button type="submit" id="submit-btn"
                            class="w-full py-4 px-6 rounded-xl font-bold text-white transition-transform active:scale-[0.98]
                                   bg-gradient-to-r from-[#042b4a] via-[#0077b6] to-[#0df5ff] shadow-lg shadow-[#0df5ff]-400/20"> <!-- Option 2: from-[#042b4a] via-[#0d9488] to-[#0df5ff] -->
                        Send Message
                    </button>
                </div>
            </form>
        </section>
    </div>

    <!-- JavaScript for Custom Dropdown and Dynamic UI -->
    <script>
        // Elements
        const dropdownTrigger = document.getElementById('dropdown-trigger');
        const dropdownMenu = document.getElementById('custom-dropdown-menu');
        const dropdownLabel = document.getElementById('dropdown-label');
        const dropdownArrowIcon = document.getElementById('dropdown-arrow');
        const hiddenInput = document.getElementById('inquiry-hidden-input');
        const customOptions = document.querySelectorAll('.custom-option');
        const otherContainer = document.getElementById('other-purpose-container');
        const otherDetailInput = document.getElementById('other_detail');

        // Toggle Dropdown Open/Close
        dropdownTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = dropdownMenu.classList.contains('show');
            if (isOpen) {
                closeDropdown();
            } else {
                openDropdown();
            }
        });

        function openDropdown() {
            dropdownMenu.classList.add('show');
            dropdownArrowIcon.classList.add('rotate-arrow');
        }

        function closeDropdown() {
            dropdownMenu.classList.remove('show');
            dropdownArrowIcon.classList.remove('rotate-arrow');
        }

        // Handle Option Selection
        customOptions.forEach(option => {
            option.addEventListener('click', () => {
                const value = option.getAttribute('data-value');
                const text = option.innerText;

                // 1. Update the label and hidden input
                dropdownLabel.innerText = text;
                hiddenInput.value = value;

                // 2. Close the menu
                closeDropdown();

                // 3. Trigger the "Other" field logic
                handleInquiryChange(value);
            });
            
            // Add hover effect via JS if needed, but CSS handles it better
        });

        // Close dropdown if user clicks anywhere else on the screen
        document.addEventListener('click', (e) => {
            if (!dropdownTrigger.contains(e.target) && !dropdownMenu.contains(e.target)) {
                closeDropdown();
            }
        });

        // Logic to show/hide "Other" field
        function handleInquiryChange(value) {
            if (value === 'other') {
                otherContainer.style.display = 'flex';
            } else {
                otherContainer.style.display = 'none';
                // If they switch from "Other" back to "Business", clear the text box
                otherDetailInput.value = "";
            }
        }

        // --- GOOGLE FORM AJAX LOGIC ---
        const form = document.getElementById('google-form');
        const toast = document.getElementById('toast');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // --- THE MAGIC STEP: Handling "Other" logic before sending ---
            // If the user selected "other", we grab the text from the custom box 
            // and overwrite the hidden input so Google receives the custom text.
            if (dropdownLabel.innerText === "Other") {
                const customText = otherDetailInput.value.trim();
                if (customText !== "") {
                    hiddenInput.value = customText;
                } else {
                    hiddenInput.value = "Other"; // Fallback if they left the box empty
                }
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Sending...";
            
            const formData = new FormData(form);

            // We use 'no-cors' because Google doesn't send CORS headers, 
            // but the data WILL still arrive in your sheet.
            fetch(form.action, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            })
            .then(() => {
                // Success!
                toast.innerText = "Message sent successfully!";
                toast.style.color = "#72e7a4";
                toast.style.borderColor = "rgba(114, 231, 164, 0.4)";
                toast.style.boxShadow = "0 0 20px rgba(114, 231, 164, 0.25)";
                toast.classList.add('show');
                
                form.reset(); // Clear the form
                dropdownLabel.innerText = "Select an option";
                handleInquiryChange("");

                // Hide toast after delay
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 4000);
                
                // Reset button after delay
                setTimeout(() => {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Send Message";
                }, 1000);
            })
            .catch(error => {
                // Error
                toast.innerText = "Oops! Something went wrong. Please try again.";
                toast.style.color = "#f87171";
                toast.style.borderColor = "rgba(248, 113, 113, 0.4)";
                toast.style.boxShadow = "0 0 25px rgba(248, 113, 113, 0.25)";
                toast.classList.add('show');

                setTimeout(() => {
                    toast.classList.remove('show');
                }, 5000);

                submitBtn.disabled = false;
                submitBtn.innerText = "Send Message";
            });
        });
    </script>
</body>
</html>
